<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký & Đăng nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .form-container { background: white; padding: 25px; border: 1px solid #dee2e6; border-radius: 8px; height: 100%; }
        h2 { font-size: 1.5rem; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container mt-5 mb-5">
    <div class="">
        <div class="row g-4">
            
            <div class="col-md-6">
                <h2>Form Đăng Ký Thông Tin</h2>
                <div class="form-container">
                    <form>
                        <div class="mb-3">
                            <label class="form-label text-secondary small">Họ và Tên</label>
                            <input type="text" class="form-control" placeholder="Nhập họ và tên">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary small">Email</label>
                            <input type="email" class="form-control" placeholder="Nhập email">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary small">Số Điện Thoại</label>
                            <input type="tel" class="form-control" placeholder="Nhập số điện thoại">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary small">Mật Khẩu</label>
                            <input type="password" class="form-control" placeholder="Nhập mật khẩu">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary small">Xác Nhận Mật Khẩu</label>
                            <input type="password" class="form-control" placeholder="Xác nhận mật khẩu">
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-secondary small d-block">Giới Tính:</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="gender" id="male" checked>
                                <label class="form-check-label" for="male">Nam</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="gender" id="female">
                                <label class="form-check-label" for="female">Nữ</label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-secondary small">Ngôn Ngữ</label>
                            <select class="form-select">
                                <option selected>Tiếng Việt</option>
                                <option value="1">English</option>
                                <option value="2">日本語</option>
                            </select>
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="terms">
                            <label class="form-check-label small" for="terms">Tôi đồng ý với các điều khoản và điều kiện</label>
                        </div>
                        
                        <button type="submit" class="btn btn-primary px-4">Đăng Ký</button>
                    </form>
                </div>
            </div>

            <div class="col-md-6">
                <h2>Form Đăng nhập</h2>
                <div class="form-container">
                    <form>
                        <div class="mb-3">
                            <label class="form-label text-secondary small">Email</label>
                            <input type="email" class="form-control" placeholder="Nhập email">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary small">Mật Khẩu</label>
                            <input type="password" class="form-control" placeholder="Nhập mật khẩu">
                        </div>
                        <button type="submit" class="btn btn-primary px-4">Đăng Nhập</button>
                    </form>
                </div>
            </div>

        </div> </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
